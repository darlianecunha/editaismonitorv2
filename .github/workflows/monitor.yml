name: Monitor Editais Brasil-Alemanha

"on":
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor (gera JSON)
        env:
          DAYS_INT: "14"
          MAX_PER_TERM_INT: "8"
          OUTPUT_DIR: "data"
        run: python monitor_editais.py

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/results.json
          git diff --cached --quiet || git commit -m "Update editais data $(date -u
